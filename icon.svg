<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <defs>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#1E293B" flood-opacity="0.22"/>
    </filter>
  </defs>

  <!-- Banana yellow background -->
  <rect width="128" height="128" rx="24" fill="#FFE135"/>

  <!-- Subtle radial shine -->
  <radialGradient id="shine" cx="38%" cy="32%" r="55%">
    <stop offset="0%" stop-color="#fff" stop-opacity="0.20"/>
    <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
  </radialGradient>
  <rect width="128" height="128" rx="24" fill="url(#shine)"/>

  <!-- Card shadow layer -->
  <rect x="30" y="20" width="68" height="88" rx="10" fill="#1E293B" opacity="0.18"
        transform="rotate(-7 64 64) translate(2 4)"/>

  <!-- Playing card -->
  <g transform="rotate(-7 64 64)">
    <rect x="30" y="20" width="68" height="88" rx="10" fill="#ffffff"/>

    <!-- Top-left corner: 5 -->
    <text x="42" y="43"
      font-family="Georgia, 'Times New Roman', serif"
      font-size="17" font-weight="700"
      fill="#1E293B">5</text>

    <!-- Top-left corner: suit -->
    <text x="43" y="57"
      font-family="Georgia, serif"
      font-size="13"
      fill="#1E293B">♠</text>

    <!-- Center large 5 -->
    <text x="64" y="83"
      text-anchor="middle"
      font-family="Georgia, 'Times New Roman', serif"
      font-size="46" font-weight="900"
      fill="#1E293B">5</text>

    <!-- Bottom-right corner (rotated 180 around card center) -->
    <g transform="rotate(180 64 64)">
      <text x="42" y="43"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="17" font-weight="700"
        fill="#1E293B">5</text>
      <text x="43" y="57"
        font-family="Georgia, serif"
        font-size="13"
        fill="#1E293B">♠</text>
    </g>
  </g>
</svg>
